server {
    listen 80;
    server_name localhost;

    # Where Nginx will look for the Angular files
    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't match a file will be redirected to index.html
    # This is required for Angular (Single Page Application) routing to work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api/ {
        # 'backend' is the name of the service we will define in docker-compose.yml
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket requests to the backend container
    location /ws {
        proxy_pass http://backend:8080/ws;
        # These headers are required to upgrade the HTTP connection to a WebSocket connection
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
